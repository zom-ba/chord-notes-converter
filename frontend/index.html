<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <title>Chord Notes Converter</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
  </head>
  <body>
    <div> <!-- 構成音をコードに変換(identify-chord) -->
      <h1>構成音をコードに変換</h1>
      <input type="text" id="inputChord" placeholder="例）C, E, G">
      <button id="convertButtonChord">変換</button>
      <div id="outputChord">構成音を入力してください</div>
    </div>
    <div> <!-- コードを構成音に変換(identify-notes) -->
      <h1>コードを構成音に変換</h1>
      <input type="text" id="inputNotes" placeholder="例）C">
      <button id="convertButtonNotes">変換</button>
      <div id="outputNotes">コードを入力してください</div>
    </div>
  </body>
</html>
