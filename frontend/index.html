<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <title>Chord Notes Converter</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@tonaljs/tonal/browser/tonal.min.js"></script>
  </head>
  <body class="container">
    <div class="title"> <!-- タイトル -->
      <h1>Chord Notes Converter</h1>
    </div>
    <div class="inputTitle"> <!-- 入力タイトル -->
      <div class="chordSection">構成音</div>
      <div class="notesSection hidden">コード</div>
      <div class="scaleSection hidden">コード</div>
    </div>
    <div class="outputTitle"> <!-- 出力タイトル -->
      <div class="chordSection">コード</div>
      <div class="notesSection hidden">構成音</div>
      <div class="scaleSection hidden">スケール</div>
    </div>
    <div class="inputText"> <!-- 入力（テキスト） -->
      <div class="chordSection"> <!-- 構成音をコードに変換(identify-chord) -->
        <input type="text" class="inputBox" id="inputChord" placeholder="例）C, E, G">
      </div>
      <div class="notesSection hidden"> <!-- コードを構成音に変換(identify-notes) -->
        <input type="text" class="inputBox" id="inputNotes" placeholder="例）C">
      </div>
      <div class="scaleSection hidden"> <!-- コードからメジャースケールを推測(estimate-scale) -->
        <input type="text" class="inputBox" id="inputScale" placeholder="例）C, Em, G">
      </div>
    </div>
    <div class="outputText"> <!-- 出力（テキスト） -->
      <div class="chordSection" id="outputChord">構成音を入力してください</div>
      <div class="notesSection hidden" id="outputNotes">コードを入力してください</div>
      <div class="scaleSection hidden" id="outputScale">コードを入力してください</div>
      <div class="outputWarning hidden" id="outputWarning"></div>
    </div>
    <div class="inputPiano3 inputPiano"> <!-- 入力（ピアノロール） -->
      <button class="inputButton whiteKey octave3">C</button>
      <button class="inputButton blackKey octave3">D♭</button>
      <button class="inputButton whiteKey octave3">D</button>
      <button class="inputButton blackKey octave3">E♭</button>
      <button class="inputButton whiteKey octave3">E</button>
      <button class="inputButton whiteKey octave3">F</button>
      <button class="inputButton blackKey octave3">G♭</button>
      <button class="inputButton whiteKey octave3">G</button>
      <button class="inputButton blackKey octave3">A♭</button>
      <button class="inputButton whiteKey octave3">A</button>
      <button class="inputButton blackKey octave3">B♭</button>
      <button class="inputButton whiteKey octave3">B</button>
    </div>
    <div class="inputPiano4 inputPiano"> <!-- 入力（ピアノロール） -->
      <button class="inputButton whiteKey octave4">C</button>
      <button class="inputButton blackKey octave4">D♭</button>
      <button class="inputButton whiteKey octave4">D</button>
      <button class="inputButton blackKey octave4">E♭</button>
      <button class="inputButton whiteKey octave4">E</button>
      <button class="inputButton whiteKey octave4">F</button>
      <button class="inputButton blackKey octave4">G♭</button>
      <button class="inputButton whiteKey octave4">G</button>
      <button class="inputButton blackKey octave4">A♭</button>
      <button class="inputButton whiteKey octave4">A</button>
      <button class="inputButton blackKey octave4">B♭</button>
      <button class="inputButton whiteKey octave4">B</button>
    </div>
    <div class="outputPiano3 outputPiano disabled"> <!-- 出力（ピアノロール） -->
      <button class="outputButton whiteKey octave3" id="button48">C</button>
      <button class="outputButton blackKey octave3" id="button49">D♭</button>
      <button class="outputButton whiteKey octave3" id="button50">D</button>
      <button class="outputButton blackKey octave3" id="button51">E♭</button>
      <button class="outputButton whiteKey octave3" id="button52">E</button>
      <button class="outputButton whiteKey octave3" id="button53">F</button>
      <button class="outputButton blackKey octave3" id="button54">G♭</button>
      <button class="outputButton whiteKey octave3" id="button55">G</button>
      <button class="outputButton blackKey octave3" id="button56">A♭</button>
      <button class="outputButton whiteKey octave3" id="button57">A</button>
      <button class="outputButton blackKey octave3" id="button58">B♭</button>
      <button class="outputButton whiteKey octave3" id="button59">B</button>
    </div>
    <div class="outputPiano4 outputPiano disabled"> <!-- 出力（ピアノロール） -->
      <button class="outputButton whiteKey octave4" id="button60">C</button>
      <button class="outputButton blackKey octave4" id="button61">D♭</button>
      <button class="outputButton whiteKey octave4" id="button62">D</button>
      <button class="outputButton blackKey octave4" id="button63">E♭</button>
      <button class="outputButton whiteKey octave4" id="button64">E</button>
      <button class="outputButton whiteKey octave4" id="button65">F</button>
      <button class="outputButton blackKey octave4" id="button66">G♭</button>
      <button class="outputButton whiteKey octave4" id="button67">G</button>
      <button class="outputButton blackKey octave4" id="button68">A♭</button>
      <button class="outputButton whiteKey octave4" id="button69">A</button>
      <button class="outputButton blackKey octave4" id="button70">B♭</button>
      <button class="outputButton whiteKey octave4" id="button71">B</button>
    </div>
    <div class="buttonSection"> <!-- ボタン -->
      <button class="displayButton active" id="displayButtonChord">構成音<br>↓<br>コード</button>
      <button class="displayButton" id="displayButtonNotes">コード<br>↓<br>構成音</button>
      <button class="displayButton" id="displayButtonScale">コード<br>↓<br>メジャースケール</button>
    </div>
  </body>
</html>
